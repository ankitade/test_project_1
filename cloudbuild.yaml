steps:
  # Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vertex-ai-gemini-server', '.']

# Push the image to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/vertex-ai-gemini-server'

# Use Cloud Logging only to resolve custom service account logging permissions issues
options:
  logging: CLOUD_LOGGING_ONLY
